name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests airflow/dags scripts

      - name: Unit tests
        run: pytest -v

      - name: Validate bundle (syntax only, no workspace needed)
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks bundle validate || echo "::warning::bundle validate needs DATABRICKS_HOST; skipping in CI"
        continue-on-error: true
